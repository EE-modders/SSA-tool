name: Python compiler windows

on: [push]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v1
    - name: Set up Python 3.7
      uses: actions/setup-python@v1
      with:
        python-version: 3.7
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    - name: python version
      run: python --version
    - name: pyinstaller version
      run: pyinstaller --version
      
    - name: Setup Go Actions
      uses: variantdev/setup-go-actions@v1.1.0
      with:
        # The Go Actions version to download (if necessary) and use. Example: 0.5.10, 0.5, 0.x
        go-actions-version: # optional, default is 0.x
    - name: compile GO library "exploder"
      run: go build .\src\lib\exploder.go

    - name: compile GO library "imploder"
      run: go build .\src\lib\imploder.go
    
    - name: run SSAtool directly
      run: python .\src\SSAtool.py -v
    
    - name: compile SSAtool
      run: pyinstaller -F --add-data ".\src\lib\exploder.exe;." .\src\SSAtool.py
      
    - name: run compiled version
      run: .\dist\SSAtool.exe -v

    - name: save compiled executable
      uses: actions/upload-artifact@master
      with:
        name: SSAtool_windows
        path: .\dist\

    - name: save compiled library
      uses: actions/upload-artifact@master
      with:
        name: SSAtool_windows
        path: .\src\lib\exploder.exe
